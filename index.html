<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cousinade 2026 — Qui ramène quoi ?</title>
<style>
  :root{
    --cream:#FBF5E9;
    --ink:#2E2A22;
    --ink-soft:#6B6255;
    --red:#C1443A;
    --orange:#E3852E;
    --gold:#E3A72E;
    --olive:#6E7E32;
    --purple:#8A5A9E;
    --line:#E2D9C4;
    --head:#F1E8D3;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    background:
      radial-gradient(circle at 12% 0%, rgba(227,167,46,0.16), transparent 45%),
      radial-gradient(circle at 90% 10%, rgba(138,90,158,0.14), transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(110,126,50,0.10), transparent 45%),
      var(--cream);
    color:var(--ink);
    font-family:Arial, Helvetica, sans-serif;
    padding:32px 16px 60px;
  }

  .wrap{max-width:900px;margin:0 auto;}

  .ribbon{
    height:6px;
    border-radius:6px;
    margin-bottom:20px;
    background:linear-gradient(90deg,
      var(--gold), var(--red), var(--purple), var(--olive), var(--orange));
  }

  h1{
    font-size:28px;
    margin:0 0 4px;
    color:var(--red);
    display:inline-block;
  }
  @supports (background-clip:text) or (-webkit-background-clip:text){
    h1{
      background:linear-gradient(90deg, var(--red), var(--purple));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }
  }

  .sub{
    color:var(--ink-soft);
    font-size:14px;
    margin-bottom:22px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border:1px solid var(--line);
  }

  thead th{
    text-align:left;
    background:var(--head);
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--ink-soft);
    padding:10px 14px;
    border-bottom:2px solid var(--gold);
  }

  tbody td{
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    font-size:15px;
  }

  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(193,68,58,0.04);}

  .empty-row td{
    color:var(--ink-soft);
    font-style:italic;
    text-align:center;
    padding:22px 14px;
  }

  .cat-tag{
    display:inline-block;
    font-size:12px;
    font-weight:bold;
    padding:3px 9px;
    border-radius:12px;
    color:#fff;
  }

  .del-btn{
    background:none;
    border:none;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:14px;
  }
  .del-btn:hover{color:var(--red);}

  .add-form{
    display:flex;
    gap:8px;
    margin-top:16px;
    flex-wrap:wrap;
    background:#fff;
    border:1px solid var(--line);
    padding:14px;
    border-radius:6px;
  }

  .add-form select,
  .add-form input{
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:5px;
    font-size:14px;
    font-family:inherit;
  }

  .add-form select{flex:1;min-width:130px;}
  .add-form input{flex:2;min-width:150px;}

  .add-form button{
    background:linear-gradient(90deg, var(--red), var(--purple));
    color:#fff;
    border:none;
    padding:9px 18px;
    border-radius:5px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
  }
  .add-form button:hover{background:linear-gradient(90deg, var(--orange), var(--red));}

  .status{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    background:var(--ink);
    color:#fff;
    font-size:12px;
    padding:8px 16px;
    border-radius:20px;
    opacity:0;
    transition:opacity .25s;
  }
  .status.show{opacity:1;}

  footer{
    text-align:center;
    margin-top:20px;
    color:var(--ink-soft);
    font-size:12px;
  }

  @media (max-width: 640px){
    body{padding:20px 12px 60px;}
    h1{font-size:22px;}
    .sub{font-size:13px;}

    .add-form{flex-direction:column;}
    .add-form select,
    .add-form input,
    .add-form button{width:100%;min-width:0;}
    .add-form select,
    .add-form input,
    .add-form button{padding:12px 10px;font-size:16px;}

    table{border:none;background:none;}
    thead{display:none;}
    tbody, tr, td{display:block;}

    tbody tr{
      background:#fff;
      border:1px solid var(--line);
      border-radius:8px;
      margin-bottom:12px;
      padding:10px 40px 10px 14px;
      position:relative;
    }
    tbody tr:hover{background:#fff;}

    tbody td{
      border-bottom:none;
      padding:6px 0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-size:14px;
    }
    tbody td::before{
      content:attr(data-label);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:var(--ink-soft);
      font-weight:bold;
    }

    tbody td:last-child{
      position:absolute;
      top:8px;
      right:8px;
      padding:0;
    }
    tbody td:last-child::before{content:none;}

    .del-btn{font-size:20px;padding:8px;line-height:1;}

    .empty-row td{
      padding:22px 14px;
      display:block;
    }
    .empty-row td::before{content:none;}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="ribbon"></div>
  <h1>Cousinade 2026</h1>
  <div class="sub">Qui vient, et qui ramène quoi 🍽️ — liste partagée entre tous les cousins et cousines</div>

  <table>
    <thead>
      <tr>
        <th style="width:22%">Nom</th>
        <th style="width:18%">Catégorie</th>
        <th>Apporte</th>
        <th style="width:40px"></th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div class="add-form">
    <input type="text" id="inputName" placeholder="Nom">
    <select id="inputCat">
      <option value="apero">Apéro</option>
      <option value="barbecue">Barbecue</option>
      <option value="entree">Entrée</option>
      <option value="plat">Plat</option>
      <option value="fromage">Fromage</option>
      <option value="dessert">Dessert</option>
    </select>
    <input type="text" id="inputDish" placeholder="Ce qu'il/elle ramène">
    <button id="addBtn">Ajouter</button>
  </div>

  <footer>Les modifications sont enregistrées automatiquement et visibles par tous.</footer>
</div>

<div class="status" id="status">Enregistré</div>

<script>
const CATEGORIES = {
  apero:    { label: "Apéro",    color: "#E3A72E" },
  barbecue: { label: "Barbecue", color: "#C1443A" },
  entree:   { label: "Entrée",   color: "#6E7E32" },
  plat:     { label: "Plat",     color: "#B8562D" },
  fromage:  { label: "Fromage",  color: "#C99A3A" },
  dessert:  { label: "Dessert",  color: "#8A5A9E" },
};

const SUPABASE_URL = "https://ejgmecoqzejdtuwfzwia.supabase.co";
const SUPABASE_KEY = "sb_publishable_C6pCeS5t1h27nIJK4MVuLA_HEuw7pI4";

let entries = [];

function showStatus(msg){
  const el = document.getElementById("status");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove("show"), 1400);
}

async function supabaseFetch(path, options = {}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      ...options.headers
    }
  });
  if(!res.ok) throw new Error(`Supabase error ${res.status}`);
  return res.status === 204 ? null : res.json();
}

async function loadEntries(){
  try{
    entries = await supabaseFetch("entries?select=*&order=created_at.asc");
  }catch(e){
    entries = [];
    showStatus("Erreur de chargement");
  }
  render();
}

function escapeHtml(str){
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function render(){
  const tbody = document.getElementById("rows");

  if(entries.length === 0){
    tbody.innerHTML = `<tr class="empty-row"><td colspan="4">Personne ne s'est encore inscrit.</td></tr>`;
    return;
  }

  tbody.innerHTML = entries.map(e => {
    const cat = CATEGORIES[e.category] || { label: e.category, color: "#999" };
    return `
      <tr data-id="${e.id}">
        <td data-label="Nom">${escapeHtml(e.name)}</td>
        <td data-label="Catégorie"><span class="cat-tag" style="background:${cat.color}">${cat.label}</span></td>
        <td data-label="Apporte">${escapeHtml(e.dish)}</td>
        <td><button class="del-btn" data-remove="${e.id}" aria-label="Supprimer">✕</button></td>
      </tr>
    `;
  }).join("");

  tbody.querySelectorAll("[data-remove]").forEach(btn => {
    btn.addEventListener("click", () => removeEntry(btn.dataset.remove));
  });
}

async function addEntry(){
  const nameInput = document.getElementById("inputName");
  const catInput = document.getElementById("inputCat");
  const dishInput = document.getElementById("inputDish");

  if(!nameInput.value.trim() || !dishInput.value.trim()) return;

  try{
    const [created] = await supabaseFetch("entries", {
      method: "POST",
      headers: { "Prefer": "return=representation" },
      body: JSON.stringify({
        name: nameInput.value.trim(),
        category: catInput.value,
        dish: dishInput.value.trim()
      })
    });
    entries.push(created);
    showStatus("Enregistré");
  }catch(e){
    showStatus("Erreur d'enregistrement");
  }

  nameInput.value = "";
  dishInput.value = "";
  nameInput.focus();

  render();
}

async function removeEntry(id){
  try{
    await supabaseFetch(`entries?id=eq.${id}`, { method: "DELETE" });
    entries = entries.filter(e => e.id !== id);
    showStatus("Supprimé");
  }catch(e){
    showStatus("Erreur de suppression");
  }
  render();
}

document.getElementById("addBtn").addEventListener("click", addEntry);
document.getElementById("inputDish").addEventListener("keydown", (e) => {
  if(e.key === "Enter") addEntry();
});
document.getElementById("inputName").addEventListener("keydown", (e) => {
  if(e.key === "Enter") document.getElementById("inputDish").focus();
});

loadEntries();
</script>

</body>
</html>
